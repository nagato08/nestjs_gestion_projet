name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/nagato08/nestjs_gestion_projet

jobs:
  # ───────────────────────────────
  # 1. Qualité : lint + build check
  # ───────────────────────────────
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build check
        run: npm run build

  # ───────────────────────────────
  # 2. Build + push image vers GHCR
  # ───────────────────────────────
  build-push:
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ───────────────────────────────
  # 3. Déploiement sur le VPS
  # ───────────────────────────────
  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ~/apps/tuto
            git pull origin main
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u nagato08 --password-stdin
            export API_IMAGE=${{ env.IMAGE }}:${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
